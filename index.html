<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mimacstudy</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="header_top">
          <div class="header_top_left">
            <a href="#">
              <div class="logo_wrap">
                <img src="/img/logo.png" alt="" />
              </div>
            </a>
            <div class="grade_btn">
              <h5>고3·N수</h5>
              <div class="arrow_wrap">
                <img src="/img/arrow_icon.png" alt="" />

            </div>
          </div>
          <a href="#">
            <div class="search_bar">
              <h6>선생님, 강좌 검색</h6>
              <div class="search_icon">
                <img src="img/search_icon.png" alt="" />
              </div>
            </div>
          </a>
        </div>
        <div class="header_bottom">
          <div class="header_bottom_left">
            <a href="#">
              <div class="menu_icon">
                <img src="/img/menu.png" alt="" />
              </div>
            </a>
            <div class="menu_wrap">
              <a href="#">
                <h5 class="menu">선생님</h5>
              </a>
              <a href="#">
                <h5 class="menu">모의고사</h5>
              </a>
              <a href="#">
                <h5 class="menu">대학별고사</h5>
              </a>
              <a href="#">
                <h5 class="menu">입시정보</h5>
              </a>
              <a href="#">
                <h5 class="menu">온라인서점</h5>
              </a>
              <div class="vertical_bar"></div>
              <a href="#">
                <h5 class="menu menu_bold">2027 대성패스</h5>
              </a>
            </div>
          </div>
          <div class="header_bottom_right">
            <a href="#">
              <h6 class="d_day">수능 D-172</h6>
            </a>
            <a href="#">
              <h6>로그인</h6>
            </a>
            <a href="#">
              <h6>회원가입</h6>
            </a>
            <a href="#">
              <h6>고객센터</h6>
            </a>
          </div>
        </div>
      </header>
      <section class="section_1">
        <div class="con_top_wrap_1">
          <div class="main_banner">
            <a href="#">
              <img src="/img/main_banner.png" alt="" />
            </a>
          </div>
          <div class="banner_description">
            <h6>
              전 강좌 수능까지 무제한! <br />
              지금 이 해택
            </h6>
            <h3>07/13(월) 마감</h3>
            <button>
              <h5>지금 바로 구매하기</h5>
            </button>
          </div>
        </div>
        <div class="con_top_wrap_2">
          <div class="sub_banner_wrap">
            <div class="sub_banner_1"></div>
            <div class="sub_banner_2"></div>
          </div>
          <div class="evaluation">
            <h6>고3 6평 등급컷</h6>
            <div class="detail_wrap">
              <div class="subject_wrap">
                <h6>화작</h6>
                <h6>언매</h6>
                <h6>확통</h6>
                <h6>미적</h6>
                <h6>기하</h6>
              </div>
              <div class="score_wrap"></div>
            </div>
          </div>
        </div>
      </section>
      <section class="section_2">
        <h1>마이맥 선생님</h1>
        <div class="capsule_wrap">

          <div class="capsule">수학</div>

            <div class="gradient_wrap">
              <img src="/img/gradient.png" alt="">

            <div class="img_wrap_2">
              <img src="/img/teacher_1.png" alt="">

            <div class="top_wrap_2">
              <h4><span>국어</span><span>김승리</span></h4>
              <div class="heart_wrap">
                <a href=""><img src="/img/heart_stroke.png" alt="" /></a>
                
              </div>
            </div>
            <div class="bottom_wrap_2">
              <a href="">
                <div class="con_title_wrap_2">
                <h4>지금 당신에게 필요한 강의</h4>

              <div class="right_arrow_icon">
                  <img src="/img/right_arrow_icon.png" alt="">
              </div>
              </a>
            </div>
          
          </div>
          <div class="con_2">
            <div class="gradient_wrap">
              <img src="/img/gradient.png" alt="">
            </div>
            <div class="img_wrap_2">
              <img src="/img/teacher_2.png" alt="">
            </div>
            <div class="top_wrap_2">
              <h4><span>국어</span><span>유대종</span></h4>
              <div class="heart_wrap">
                <a href=""><img src="/img/heart_stroke.png" alt="" /></a>
                
              </div>
            </div>
            <div class="bottom_wrap_2">
              <a href="">
                <div class="con_title_wrap_2">
                <h4>이제는 속도전이다!</h4>
                 <h2>2027 진또배기 & 이뮨</h2>
               </div>
              <div class="right_arrow_icon">
                  <img src="/img/right_arrow_icon.png" alt="">
              </div>
              </a>
            </div>
          
          </div>
          <div class="con_2">
            <div class="gradient_wrap">
              <img src="/img/gradient.png" alt="">
            </div>
            <div class="img_wrap_2">
              <img src="/img/teacher_3.png" alt="">
            </div>
            <div class="top_wrap_2">
              <h4><span>국어</span><span>정석민</span></h4>
              <div class="heart_wrap">
                <a href=""><img src="/img/heart_stroke.png" alt="" /></a>
                
              </div>
            </div>
            <div class="bottom_wrap_2">
              <a href="">
                <div class="con_title_wrap_2">
                <h4>정석국어 시즌3</h4>
                 <h2>2027 비문학 원리와 실천</h2>
               </div>
              <div class="right_arrow_icon">
                  <img src="/img/right_arrow_icon.png" alt="">
              </div>
              </a>
            </div>
          
          </div>

      <section class="section_3"></section>
      <footer></footer>
