<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mimacstudy</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <div class="wrap">
      <header>
        <div class="header_top">
          <div class="header_top_left">
            <a href="#">
              <div class="logo_wrap">
                <img src="/img/logo.png" alt="" />
              </div>
            </a>
            <div class="grade_btn">
              <h5>고3·N수</h5>
              <div class="arrow_wrap">
                <img src="/img/arrow_icon.png" alt="" />
              </div>
            </div>
          </div>
          <a href="#">
            <div class="search_bar">
              <h6>선생님, 강좌 검색</h6>
              <div class="search_icon">
                <img src="img/search_icon.png" alt="" />
              </div>
            </div>
          </a>
        </div>
        <div class="header_bottom">
          <div class="header_bottom_left">
            <a href="#">
              <div class="menu_icon">
                <img src="/img/menu.png" alt="" />
              </div>
            </a>
            <div class="menu_wrap">
              <a href="#">
                <h4 class="menu">선생님</h4>
              </a>
              <a href="#">
                <h4 class="menu">모의고사</h4>
              </a>
              <a href="#">
                <h4 class="menu">대학별고사</h4>
              </a>
              <a href="#">
                <h4 class="menu">입시정보</h4>
              </a>
              <a href="#">
                <h4 class="menu">온라인서점</h4>
              </a>
              <div class="vertical_bar"></div>
              <a href="#">
                <h4 class="menu menu_bold">2027 대성패스</h4>
              </a>
            </div>
          </div>
          <div class="header_bottom_right">
            <a href="#">
              <h6 class="d_day">수능 D-172</h6>
            </a>
            <a href="#">
              <h6>로그인</h6>
            </a>
            <a href="#">
              <h6>회원가입</h6>
            </a>
            <a href="#">
              <h6>고객센터</h6>
            </a>
          </div>
        </div>
      </header>
      <section class="sectioon_1">
        <div class="con_top_wrap_1">
          <div class="main_banner">
            <a href="#">
              <img src="/img/main_banner.png" alt="" />
            </a>
          </div>
          <div class="banner_description">
            <h6>
              전 강좌 수능까지 무제한! <br />
              지금 이 해택
            </h6>
            <h3>07/13(월) 마감</h3>
            <button>
              <h5>지금 바로 구매하기</h5>
            </button>
          </div>
        </div>
        <div class="con_top_wrap_2">
          <div class="sub_banner_1"></div>
          <div class="sub_banner_2"></div>
          <div class="evaluation">
            <h6>고3 6평 등급컷</h6>
            <div class="detail_wrap">
              <div class="subject_wrap">
                <h6>화작</h6>
                <h6>언매</h6>
                <h6>확통</h6>
                <h6>미적</h6>
                <h6>기하</h6>
              </div>
              <div class="score_wrap"></div>
            </div>
          </div>
        </div>
      </section>
      <section class="sectioon_2"></section>
      <section class="sectioon_3"></section>
      <footer></footer>
    </div>
  </body>
</html>
